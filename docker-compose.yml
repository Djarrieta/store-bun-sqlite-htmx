services:
  web:
    container_name: store-bun-sqlite-htmx-web
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DEV_LOGIN: "0"
    ports:
      - "127.0.0.1:4010:4010"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: crista-click-tunnel
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./deploy:/etc/cloudflared:ro
    restart: unless-stopped
    depends_on:
      - web
