services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads

  # Optional: publish via Cloudflare Tunnel (token from Zero Trust dashboard).
